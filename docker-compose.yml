version: '3.8'

services:
  frontend:
    build: ./frontend
    container_name: tiny-frontend
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: tiny-backend
    volumes:
      - backend-db:/app/db
    networks:
      - app-network

  nginx:
    image: nginx:stable-alpine
    container_name: tiny-nginx
    ports:
      - "8080:80" # NPM이 이 포트로 접속하게 됩니다.
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  backend-db:
