version: '3.8'

services:
  frontend:
    build: ./frontend
    container_name: tiny-frontend
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: tiny-backend
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - app-network

  nginx:
    image: nginx:stable-alpine
    container_name: tiny-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    container_name: tiny-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    # This command checks for cert renewal every 12 hours
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  certbot-etc:
  certbot-var:
  webroot:
